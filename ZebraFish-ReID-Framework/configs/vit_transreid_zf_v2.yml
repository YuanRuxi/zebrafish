# =============================================================================
# vit_transreid_zf_v2.yml
# -----------------------------------------------------------------------------
# 斑马鱼 Re-ID 黄金权重 transformer_20.pth 的匹配配置（JPM=True 版本）。
#
# 来源依据：
#   - 用户提供的权威加载脚本 Dynamic_Domain_Eval.py 使用此配置加载 pth A
#   - 仓库基础配置 configs/Market/vit_transreid_384.yml（JPM=True, SIE_CAMERA=True,
#     STRIDE_SIZE=[16,16], RE_ARRANGE=True）作为架构蓝本
#   - config/defaults.py 的默认值：PIXEL_MEAN/STD=ImageNet, NECK_FEAT='after',
#     SHIFT_NUM=5, SHUFFLE_GROUP=2, SIE_COE=3.0
#
# 注意：本框架为“仅推理”用途，PRETRAIN_CHOICE 设为 'no'（权重由 pth 文件载入，
# 不依赖 ImageNet 预训练文件）。推理变换严格使用：
#   Resize(SIZE_TEST) -> ToTensor -> Normalize(ImageNet mean/std)
# =============================================================================

MODEL:
  PRETRAIN_CHOICE: 'no'
  PRETRAIN_PATH: ''
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]
  JPM: True
  RE_ARRANGE: True
  NECK: 'bnneck'
  SIE_CAMERA: True
  SIE_VIEW: False
  SIE_COE: 3.0

INPUT:
  SIZE_TRAIN: [256, 288]
  SIZE_TEST: [256, 288]
  PROB: 0.5
  RE_PROB: 0.5
  PADDING: 10
  PIXEL_MEAN: [0.485, 0.456, 0.406]
  PIXEL_STD: [0.229, 0.224, 0.225]

DATASETS:
  NAMES: ('market1501')
  ROOT_DIR: ('../../data')

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 120
  BASE_LR: 0.008
  IMS_PER_BATCH: 64
  WARMUP_METHOD: 'linear'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 120
  LOG_PERIOD: 50
  EVAL_PERIOD: 120
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2

TEST:
  EVAL: True
  IMS_PER_BATCH: 256
  RE_RANKING: False
  NECK_FEAT: 'after'
  FEAT_NORM: 'yes'

OUTPUT_DIR: './logs'
